  <!-- Payment Portal Injection Script -->
  <script>
    function initPaymentPortal() {
      const observer = new MutationObserver(() => {
        const portal = document.getElementById('payment-portal');
        if (portal && !portal.hasAttribute('data-rendered')) {
          portal.setAttribute('data-rendered', 'true');
          
          const whatsapp = portal.getAttribute('data-whatsapp');
          
          // Determine Price based on Date
          const now = new Date();
          let price = "Rp. 100.000";
          let priceRaw = "100000";
          
          const year = now.getFullYear();
          const month = now.getMonth();
          const date = now.getDate();
          
          if (year === 2026 && month === 3 && date >= 27) { // April 27 - April 30
              price = "Rp. 125.000";
              priceRaw = "125000";
          } else if (year === 2026 && month === 4 && date === 1) { // May 1
              price = "Rp. 125.000";
              priceRaw = "125000";
          } else if (year === 2026 && month === 4 && date === 2) { // May 2
              price = "Rp. 150.000";
              priceRaw = "150000";
          } else if (year > 2026 || (year === 2026 && month === 4 && date >= 3) || (year === 2026 && month > 4)) { // >= May 3
              price = "Rp. 200.000";
              priceRaw = "200000";
          }
          
          portal.innerHTML = `
            <style>
              a[href^="https://wa.me/"]:not(#wa-confirm-btn) { display: none !important; }
              #payment-portal, #payment-portal * { box-sizing: border-box; max-width: 100%; word-break: break-word; }
              @media (max-width: 768px) {
                #payment-portal .instruction-text { font-size: 12px !important; }
                #payment-portal .field-label { font-size: 11px !important; margin-bottom: 2px !important; }
                #payment-portal .field-value { font-size: 14px !important; }
                #payment-portal .copy-btn { font-size: 10px !important; padding: 6px 10px !important; }
                #payment-portal .wrapper { padding: 10px !important; }
              }
            </style>
            <div class="wrapper" style="background: rgba(197, 160, 89, 0.1); border: 2px solid #c5a059; border-radius: 12px; padding: 12px; text-align: left; margin-bottom: 16px; width: 100%; overflow: hidden;">
              <h4 style="color: #c5a059; font-size: 15px; font-weight: 900; margin-top: 0; margin-bottom: 8px; text-transform: uppercase;">Detail Pembayaran</h4>
              <p class="instruction-text" style="font-size: 13px; color: #000; margin: 0 0 10px 0; line-height: 1.3; font-weight: normal;">Silahkan Lakukan Transfer Biaya Pendaftaran Sesuai Nominal dan Upload Resi</p>
              
              <div style="margin-bottom: 8px;">
                <p class="field-label" style="font-size: 12px; color: #000; font-weight: normal; margin: 0 0 2px 0; text-transform: uppercase; letter-spacing: 0.5px;">Nominal Biaya Pendaftaran</p>
                <div style="display: flex; align-items: center; justify-content: space-between; background: #0a0c10; padding: 8px 10px; border-radius: 8px;">
                  <span class="field-value" style="font-size: 16px; font-weight: bold; color: #fff;">${price} <span style="font-size: 11px; font-weight: normal; color: #94a3b8;">/ orang</span></span>
                  <button class="copy-btn" onclick="navigator.clipboard.writeText('${priceRaw}'); this.innerText='Tercopy!'; setTimeout(()=>this.innerText='Copy', 2000)" style="background: #c5a059; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;">Copy</button>
                </div>
              </div>
              
              <div style="margin-bottom: 8px;">
                <p class="field-label" style="font-size: 12px; color: #000; font-weight: normal; margin: 0 0 2px 0; text-transform: uppercase; letter-spacing: 0.5px;">Rekening Bank BSI</p>
                <div style="display: flex; align-items: center; justify-content: space-between; background: #0a0c10; padding: 8px 10px; border-radius: 8px;">
                  <div>
                    <div class="field-value" style="font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 2px;"><span style="color: #c5a059;">7183513804</span></div>
                    <div style="font-size: 11px; color: #94a3b8;">a/n M.Hisyam Irawady</div>
                  </div>
                  <button class="copy-btn" onclick="navigator.clipboard.writeText('7183513804'); this.innerText='Tercopy!'; setTimeout(()=>this.innerText='Copy', 2000)" style="background: #c5a059; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase;">Copy</button>
                </div>
              </div>

              <hr style="border: none; border-top: 1px solid rgba(197, 160, 89, 0.2); margin: 10px 0;" />

              <h4 style="color: #c5a059; font-size: 14px; font-weight: 900; margin-top: 0; margin-bottom: 6px; text-transform: uppercase;">Upload Bukti Transfer</h4>
              <form id="upload-proof-form" style="display: flex; flex-direction: column; gap: 6px;">
                <input type="file" id="proof-file" accept="image/*,.pdf" required style="background: #0a0c10; color: #fff; padding: 8px; border-radius: 8px; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; width: 100%;" />
                <button type="submit" id="upload-btn" style="background: linear-gradient(135deg, #d4af37, #aa7c11); color: #000; border: 2px solid #fff; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); width: 100%;">🚀 Unggah Bukti Sekarang</button>
                <p id="upload-status" style="font-size: 12px; margin: 0; display: none; font-weight: bold; text-align: center; width: 100%;"></p>
                <a id="wa-confirm-btn" href="#" target="_blank" style="display: none; background: #25D366; color: #fff; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 900; text-align: center; text-transform: uppercase; margin-top: 4px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); border: 2px solid #fff; width: 100%;">💬 Konfirmasi via WhatsApp</a>
              </form>
            </div>
          `;

          const form = document.getElementById('upload-proof-form');
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('proof-file');
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');
            const waBtn = document.getElementById('wa-confirm-btn');
            const fullName = portal.getAttribute('data-name');
            
            if (!fileInput.files[0]) return;

            btn.disabled = true;
            btn.innerText = 'MENGUNGGAH...';
            btn.style.opacity = '0.7';

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('whatsapp', whatsapp);

            const uploadData = (dataToUpload) => {
              fetch('/upload_proof.php', {
                method: 'POST',
                body: dataToUpload
              })
              .then(res => res.json())
              .then(data => {
                if (data.success) {
                  status.style.display = 'block';
                  status.style.color = '#10b981';
                  status.innerText = '✅ BUKTI TRANSFER BERHASIL DIUNGGAH!';
                  btn.style.display = 'none';
                  fileInput.style.display = 'none';
                  
                  // Setup WhatsApp button
                  const text = encodeURIComponent(`Halo admin *Genz Syar'ie*, saya sudah melakukan pendaftaran atas nama *${fullName}* dan telah mengunggah resi bukti transfer pembayaran.`);
                  waBtn.href = `https://wa.me/6285247028543?text=${text}`;
                  waBtn.style.display = 'block';
                } else {
                  throw new Error(data.message || 'Gagal mengunggah');
                }
              })
              .catch(err => {
                status.style.display = 'block';
                status.style.color = '#ef4444';
                status.innerText = '❌ ' + err.message;
                btn.disabled = false;
                btn.innerText = 'COBA LAGI';
                btn.style.opacity = '1';
              });
            };

            if (file.type.startsWith('image/')) {
                const img = new Image();
                img.onload = function() {
                    URL.revokeObjectURL(this.src); // Free memory
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const MAX_WIDTH = 1200;
                    const MAX_HEIGHT = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob(function(blob) {
                        formData.append('payment_proof', blob, file.name);
                        uploadData(formData);
                    }, 'image/jpeg', 0.8);
                };
                img.src = URL.createObjectURL(file);
            } else {
                formData.append('payment_proof', file);
                uploadData(formData);
            }
          });
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
    
    function initCTAs() {
      const ctaObserver = new MutationObserver(() => {
        const h2Elements = document.querySelectorAll('h2');
        h2Elements.forEach(h2 => {
          // CTA 1: Under "Berapa Lama Waktu Kita."
          if (h2.innerText.includes('Berapa Lama') && !h2.parentElement.querySelector('.extra-cta-1')) {
            const btnContainer = document.createElement('div');
            btnContainer.className = 'extra-cta-1';
            btnContainer.style.marginTop = '30px';
            btnContainer.style.textAlign = 'left';
            btnContainer.innerHTML = '<a href="#register" class="neo-button text-sm" style="display: inline-block;">Daftar Sekarang & Amankan Bisnis Anda</a>';
            // In the "Berapa Lama" section, the h2 is in a div that is inside another div. Let's append after the h2.
            h2.parentElement.appendChild(btnContainer);
          }
          // CTA 2: Below "WHAT YOU WILL LEARN" cards
          if (h2.innerText.includes('WHAT YOU') && !h2.parentElement.parentElement.querySelector('.extra-cta-2')) {
            const btnContainer = document.createElement('div');
            btnContainer.className = 'extra-cta-2';
            btnContainer.style.marginTop = '60px';
            btnContainer.style.textAlign = 'center';
            btnContainer.innerHTML = '<a href="#register" class="neo-button text-sm" style="display: inline-block;">Daftar Sekarang & Amankan Bisnis Anda</a>';
            h2.parentElement.parentElement.appendChild(btnContainer);
          }
        });
      });
      ctaObserver.observe(document.body, { childList: true, subtree: true });
    }
    
    initCTAs();
    initPaymentPortal();
  </script>
